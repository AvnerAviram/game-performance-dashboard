# Game Analytics Dashboard - Nginx Configuration
# Replace YOUR_DOMAIN with your actual domain name
# SSL certs via: sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/game-dashboard/dist;
    index dashboard.html;
    server_tokens off;
    autoindex off;

    # Basic auth
    auth_basic "Game Analytics Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net; worker-src 'self' blob:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # Block hidden files (.env, .git, etc)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Cache static assets (hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache data files (they change on re-enrichment)
    location /data/ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /dashboard.html;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# Reject requests with wrong Host header
server {
    listen 80 default_server;
    listen 443 default_server ssl;
    server_name _;
    ssl_reject_handshake on;
    return 444;
}
