<!-- Providers Page -->
<div class="pb-32">
    <!-- Sticky Header -->
    <div
        class="sticky top-0 -ml-8 -mr-8 pl-8 pr-4 z-[100] bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 mb-6"
    >
        <div class="flex justify-between items-center py-5">
            <div>
                <h2 class="text-[1.65rem] font-bold tracking-tight text-gray-900 dark:text-white mb-1.5">
                    Providers
                    <span class="text-gray-500 dark:text-gray-400 font-normal"
                        >(<span id="providers-count">-</span>)</span
                    >
                </h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">Performance analysis by studio</p>
            </div>
            <div class="flex gap-2">
                <div class="relative">
                    <input
                        type="text"
                        id="provider-search"
                        class="pl-9 pr-3 py-2 border border-gray-200 dark:border-gray-700 rounded-md text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-white placeholder-gray-400 hover:border-gray-300 dark:hover:border-gray-600 focus:border-gray-400 dark:focus:border-gray-500 focus:ring-1 focus:ring-gray-400 dark:focus:ring-gray-500 outline-none transition-colors w-full sm:w-56"
                        placeholder="Search providers..."
                        autocomplete="off"
                    />
                    <svg
                        class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                        />
                    </svg>
                </div>
                <select
                    id="providers-filter-mechanic"
                    class="pl-3 pr-10 py-2 border border-gray-200 dark:border-gray-700 rounded-md text-sm bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 focus:border-gray-400 dark:focus:border-gray-500 focus:ring-1 focus:ring-gray-400 dark:focus:ring-gray-500 outline-none transition-colors appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 12 12%27%3e%3cpath fill=%27%236b7280%27 d=%27M6 9L1 4h10z%27/%3e%3c/svg%3e')] bg-no-repeat bg-[length:12px] bg-[right_0.75rem_center]"
                >
                    <option value="">All Mechanics</option>
                </select>
                <select
                    id="providers-filter-theme"
                    class="pl-3 pr-10 py-2 border border-gray-200 dark:border-gray-700 rounded-md text-sm bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 focus:border-gray-400 dark:focus:border-gray-500 focus:ring-1 focus:ring-gray-400 dark:focus:ring-gray-500 outline-none transition-colors appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 12 12%27%3e%3cpath fill=%27%236b7280%27 d=%27M6 9L1 4h10z%27/%3e%3c/svg%3e')] bg-no-repeat bg-[length:12px] bg-[right_0.75rem_center]"
                >
                    <option value="">All Themes</option>
                </select>
                <div class="relative -mr-1 flex items-center">
                    <button
                        id="hamburger-btn"
                        type="button"
                        class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white transition-colors"
                        aria-label="Account menu"
                        aria-expanded="false"
                        aria-haspopup="true"
                    >
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"
                            />
                        </svg>
                    </button>
                    <div
                        id="hamburger-dropdown"
                        class="hidden absolute right-0 top-full mt-1 w-48 py-1 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 z-[200]"
                    >
                        <button
                            id="auth-login-btn"
                            type="button"
                            class="w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors flex items-center gap-2"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
                                /></svg
                            >Log in
                        </button>
                        <button
                            id="auth-logout-btn"
                            type="button"
                            class="hidden w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 dark:hover:text-red-400 transition-colors flex items-center gap-2"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                                /></svg
                            >Log out
                        </button>
                        <div class="border-t border-gray-200 dark:border-gray-700 my-1"></div>
                        <button
                            type="button"
                            onclick="window.openFeedbackModal()"
                            class="w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors flex items-center gap-2"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"
                                /></svg
                            >Submit Feedback
                        </button>
                        <button
                            type="button"
                            onclick="showPage('tickets')"
                            class="w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors flex items-center gap-2"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                                /></svg
                            >View Tickets
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Provider Filter Tabs -->
    <div class="filter-tabs-container flex gap-3 mb-6">
        <button
            class="provider-tab px-5 py-2.5 rounded-lg text-[0.9375rem] font-medium cursor-pointer transition-all duration-200 whitespace-nowrap border-2 bg-indigo-600 border-indigo-600 text-white shadow-[0_2px_8px_rgba(99,102,241,0.3)]"
            data-filter="all"
            onclick="window.switchProviderView('all')"
        >
            All Providers
        </button>
        <button
            class="provider-tab px-5 py-2.5 rounded-lg text-[0.9375rem] font-medium cursor-pointer transition-all duration-200 whitespace-nowrap border-2 border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-400 hover:-translate-y-px"
            data-filter="topStudios"
            onclick="window.switchProviderView('topStudios')"
        >
            🏆 Top Studios
        </button>
        <button
            class="provider-tab px-5 py-2.5 rounded-lg text-[0.9375rem] font-medium cursor-pointer transition-all duration-200 whitespace-nowrap border-2 border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-400 hover:-translate-y-px"
            data-filter="highQuality"
            onclick="window.switchProviderView('highQuality')"
        >
            💎 High Quality
        </button>
    </div>

    <!-- Providers Content (dynamically rendered) -->
    <div id="providers-content">Loading providers...</div>

    <!-- Pagination Footer - Static HTML (populated by JavaScript) -->
    <div
        id="providers-pagination-footer"
        class="fixed bottom-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] py-4 px-8 flex items-center justify-between z-[500] transition-all duration-300"
        style="left: 240px; right: 0"
    >
        <!-- Left: Items per page selector -->
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-600 dark:text-gray-400">Show:</span>
            <select
                id="providers-per-page-footer"
                class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm font-medium focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                onchange="window.changeProvidersPerPage(parseInt(this.value))"
            >
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <span class="text-sm text-gray-600 dark:text-gray-400">per page</span>
        </div>

        <!-- Center: Pagination controls -->
        <div class="flex items-center gap-2">
            <button
                id="providers-prev-btn"
                onclick="window.goToProvidersPage(window.providersCurrentPage - 1)"
                disabled
                class="px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
            >
                ← Previous
            </button>
            <span class="text-sm text-gray-700 dark:text-gray-300 px-4">
                Page <span class="font-semibold" id="providers-current-page">1</span> of
                <span class="font-semibold" id="providers-total-pages">1</span>
            </span>
            <button
                id="providers-next-btn"
                onclick="window.goToProvidersPage(window.providersCurrentPage + 1)"
                disabled
                class="px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
            >
                Next →
            </button>
        </div>

        <!-- Right: Showing info -->
        <div id="providers-showing-info" class="text-sm text-gray-600 dark:text-gray-400 min-w-[200px] text-right">
            Showing <span class="font-semibold">1-50</span> of <span class="font-semibold">0</span>
        </div>
    </div>
</div>
<!-- End pb-32 wrapper -->
