                try {
                    if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');

                if ('serviceWorker' in navigator) {

                <div class="shrink-0 mt-auto border-t border-[#d1d5db] dark:border-[#3f4553] mx-3 mb-3 pt-2">
                    <button
                        class="flex items-center gap-3 w-full py-2.5 px-4 rounded-lg bg-transparent text-gray-600 dark:text-gray-400 cursor-pointer text-[13px] font-medium transition-all duration-150 hover:bg-white/60 dark:hover:bg-white/5 hover:text-gray-900 dark:hover:text-white"
                        id="dark-mode-toggle"
                        aria-label="Toggle dark mode"
                    >
                        <span class="flex items-center justify-center w-5 h-5 shrink-0 text-base leading-none">
                            <span class="light-icon">🌙</span>
                            <span class="dark-icon hidden">☀️</span>
                        </span>
                        <span class="nav-text sidebar-text flex-1 text-left">Dark Mode</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content Area (z-[501] so header/cards appear above sidebar edge when -ml-8 overlaps) -->
            <main
                id="main-content"
                role="main"
                tabindex="-1"
                class="relative flex-1 transition-all duration-300 flex flex-col min-h-0 z-[501]"
                style="margin-left: 240px"
                aria-live="polite"
            >
                <!-- Page containers load here (hamburger is in each page's header) -->
                <div id="page-container" class="flex-1 overflow-y-auto px-8 flex flex-col min-h-0"></div>
            </main>
        </div>

        <!-- Feedback Ticket Modal -->
        <div id="feedback-modal" class="fixed inset-0 z-[2000] hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="window.closeFeedbackModal()"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg">
                <div
                    class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden"
                >
                    <div
                        class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 flex items-center justify-between"
                    >
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"
                                    />
                                </svg>
                            </div>
                            <div>
                                <h3 class="text-white font-semibold text-lg">Submit Feedback</h3>
                                <p class="text-white/70 text-xs">Report data issues or suggestions</p>
                            </div>
                        </div>
                        <button
                            onclick="window.closeFeedbackModal()"
                            class="text-white/70 hover:text-white transition-colors"
                        >
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"
                                />
                            </svg>
                        </button>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                                >Game Name</label
                            >
                            <input
                                type="text"
                                id="modal-feedback-game"
                                placeholder="e.g. Cash Eruption, Buffalo Gold..."
                                class="w-full px-4 py-2.5 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm"
                            />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                                >Issue Type</label
                            >
                            <select
                                id="modal-feedback-type"
                                class="w-full px-4 py-2.5 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm"
                            >
                                <option value="data-issue">Data Issue</option>
                                <option value="ui-bug">UI Bug</option>
                                <option value="feature-request">Feature Request</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                                >Description</label
                            >
                            <textarea
                                id="modal-feedback-desc"
                                rows="4"
                                placeholder="Describe the issue or suggestion..."
                                class="w-full px-4 py-2.5 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm resize-none"
                            ></textarea>
                        </div>
                        <div id="modal-feedback-status" class="hidden text-sm"></div>
                        <div class="flex gap-3 pt-2">
                            <button
                                onclick="window.closeFeedbackModal()"
                                class="flex-1 px-4 py-2.5 border border-gray-200 dark:border-gray-600 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                            >
                                Cancel
                            </button>
                            <button
                                onclick="window.submitModalTicket()"
                                class="flex-1 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 rounded-xl text-sm font-medium text-white transition-colors flex items-center justify-center gap-2"
                            >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
                                    />
                                </svg>
                                Submit
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Backdrop Overlay for Side Panels -->
        <div
            class="fixed bg-[rgba(0,0,0,0.5)] hidden z-[1000] inset-0"
            id="mechanic-backdrop"
            onclick="closeAnyPanel()"
        ></div>

        <!-- Game Details Side Panel -->
        <div
            class="fixed top-0 right-[-650px] h-screen w-[600px] max-w-[90vw] bg-gray-50 dark:bg-gray-900 shadow-[-8px_0_40px_rgba(0,0,0,0.2)] z-[1100] overflow-y-auto transition-[right] duration-300 ease-in-out"
            id="game-panel"
        >
            <div class="sticky top-0 z-10">
                <div class="h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                <div
                    class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-200/50 dark:border-gray-700/50"
                >
                    <h3 id="game-panel-title" class="text-base font-bold text-gray-900 dark:text-white m-0">
                        Game Details
                    </h3>
                    <button
                        class="w-7 h-7 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border-none text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-lg flex items-center justify-center cursor-pointer transition-all"
                        onclick="closeGamePanel()"
                    >
                        ✕
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="game-description"></div>
                <div id="game-art"></div>
                <div id="game-performance"></div>
                <div id="game-provider"></div>
                <div id="game-differentiators"></div>
                <div id="game-specs"></div>
                <div id="game-theme-mechanic"></div>
                <div id="game-demo"></div>
                <div id="game-play-now"></div>
                <div id="game-symbols"></div>
                <div id="game-release"></div>
                <div id="game-data-quality"></div>
                <div id="game-similar"></div>
                <div id="game-feedback"></div>
            </div>
        </div>

        <!-- Provider Details Side Panel -->
        <div
            class="fixed top-0 right-[-650px] h-screen w-[600px] max-w-[90vw] bg-gray-50 dark:bg-gray-900 shadow-[-8px_0_40px_rgba(0,0,0,0.2)] z-[1100] overflow-y-auto transition-[right] duration-300 ease-in-out"
            id="provider-panel"
        >
            <div class="sticky top-0 z-10">
                <div class="h-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500"></div>
                <div
                    class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-200/50 dark:border-gray-700/50"
                >
                    <h3 id="provider-panel-title" class="text-base font-bold text-gray-900 dark:text-white m-0">
                        Provider Details
                    </h3>
                    <button
                        class="w-7 h-7 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border-none text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-lg flex items-center justify-center cursor-pointer transition-all"
                        onclick="closeProviderPanel()"
                    >
                        ✕
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="provider-panel-content"></div>
            </div>
        </div>

        <!-- Mechanic Details Side Panel -->
        <div
            class="fixed top-0 right-[-650px] h-screen w-[600px] max-w-[90vw] bg-gray-50 dark:bg-gray-900 shadow-[-8px_0_40px_rgba(0,0,0,0.2)] z-[1100] overflow-y-auto transition-[right] duration-300 ease-in-out"
            id="mechanic-panel"
        >
            <div class="sticky top-0 z-10">
                <div class="h-1 bg-gradient-to-r from-violet-500 via-purple-500 to-fuchsia-500"></div>
                <div
                    class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-200/50 dark:border-gray-700/50"
                >
                    <h3 id="mechanic-panel-title" class="text-base font-bold text-gray-900 dark:text-white m-0">
                        Mechanic Details
                    </h3>
                    <button
                        class="w-7 h-7 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border-none text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-lg flex items-center justify-center cursor-pointer transition-all"
                        onclick="closeMechanicPanel()"
                    >
                        ✕
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="mechanic-panel-content"></div>
            </div>
        </div>

        <!-- Theme Details Side Panel -->
        <div
            class="fixed top-0 right-[-650px] h-screen w-[600px] max-w-[90vw] bg-gray-50 dark:bg-gray-900 shadow-[-8px_0_40px_rgba(0,0,0,0.2)] z-[1100] overflow-y-auto transition-[right] duration-300 ease-in-out"
            id="theme-panel"
        >
            <div class="sticky top-0 z-10">
                <div class="h-1 bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500"></div>
                <div
                    class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-200/50 dark:border-gray-700/50"
                >
                    <h3 id="theme-panel-title" class="text-base font-bold text-gray-900 dark:text-white m-0">
                        Theme Details
                    </h3>
                    <button
                        class="w-7 h-7 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border-none text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-lg flex items-center justify-center cursor-pointer transition-all"
                        onclick="closeThemePanel()"
                    >
                        ✕
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="theme-panel-content"></div>
            </div>
        </div>

        <!-- Main application (Chart.js loaded via ESM import, tree-shaken) -->
        <script type="module" src="src/app.js?v=250"></script>
    </body>
</html>
