<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in – Game Analytics Dashboard</title>
    <meta name="description" content="Sign in to the Game Analytics Dashboard.">
    <link rel="icon" type="image/png" href="/src/assets/ags-logo.png">
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="h-full m-0 p-0 font-sans bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md px-6">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="dashboard.html" class="inline-flex items-center gap-3 mb-6">
                <span class="flex-shrink-0 w-12 h-12 flex items-center justify-center">
                    <img src="src/assets/ags-logo.png" alt="AGS" class="max-w-full max-h-full w-auto h-auto object-contain">
                </span>
                <span class="text-xl font-bold text-gray-900 dark:text-white">Game Analytics</span>
            </a>
        </div>

        <!-- Login Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-8">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Sign in</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Enter your credentials to access the dashboard</p>

            <form id="login-form" class="space-y-6">
                <div>
                    <label for="login-username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Username or email</label>
                    <input type="text" id="login-username" name="username" required autofocus autocomplete="username" placeholder="Enter your username" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                </div>
                <div>
                    <label for="login-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="Enter your password" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                </div>
                <p id="login-error" class="text-sm text-red-600 dark:text-red-400 hidden px-1 pt-1"></p>
                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="login-remember" name="remember" class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-indigo-600 focus:ring-indigo-500 dark:bg-gray-700 cursor-pointer">
                    <label for="login-remember" class="text-sm text-gray-600 dark:text-gray-400 cursor-pointer select-none">Remember me for 30 days</label>
                </div>
                <div>
                    <button type="submit" id="login-submit" class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-base rounded-xl transition-colors flex items-center justify-center gap-2 shadow-sm hover:shadow min-h-[52px]">
                        <span>Sign in</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
            Contact your administrator for access.
        </p>
    </div>

    <script type="module" src="/src/pages/login-page.js"></script>
</body>
</html>
